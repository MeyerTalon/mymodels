# ~5.3M parameters (5,273,088; weight-tied embeddings)
# model configuration
model_name: wikipedia_small
number_of_articles: 200
use_local_articles: True     # reuse the local corpus so a run needs no network

# tokenizer
vocab_size: 8000
min_frequency: 2

# model architecture
d_model: 256
n_heads: 4
n_layers: 4
d_ff: 1024
max_seq_len: 256
dropout: 0.1

# training configuration
num_epochs: 5
batch_size: 16
grad_accum_steps: 1          # effective batch = batch_size * grad_accum_steps
learning_rate: 0.0003
min_lr: 0.00003
weight_decay: 0.1
warmup_epochs: 1
max_grad_norm: 1.0
precision: bf16              # bf16 has fp32 exponent range: stable on MPS without a grad scaler (fp16 can diverge there)
val_fraction: 0.02
save_every: 1
log_interval: 50

# data configuration
data_dir: wikipedia/data
num_workers: 2

# weights directory
weights_dir: wikipedia/weights

# reports directory (per-run loss charts: <reports_dir>/<model_name>_<date>_<time>/report.png)
reports_dir: wikipedia/reports
